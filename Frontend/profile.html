<!DOCTYPE html>
<html>
<head>
    <title>Profile - MeGPT</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
        }

        button {
            padding: 6px 12px;
            margin: 5px 0;
            cursor: pointer;
        }

        .text-item {
            background: #f4f4f4;
            padding: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .note {
            font-size: 0.9em;
            color: gray;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            white-space: pre-wrap;
        }

        #status {
            margin-top: 10px;
            margin-bottom: 10px;
            color: #444;
        }
    </style>
</head>
<body>

<h1>Profile</h1>

<a href="index.html">
    <button>Back</button>
</a>

<p class="note">
Recommended: Add at least 5 texts to build a strong profile.
</p>

<div id="status">Checking login...</div>

<textarea id="textInput" placeholder="Type your text here..."></textarea>
<button onclick="addText()">Add Text</button>

<h3>Saved Texts</h3>
<div id="textList"></div>

<h3>Selected Text</h3>
<pre id="selectedText"></pre>

<button onclick="resetProfile()">Delete All</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const API_BASE = "https://megpt-29p3.onrender.com";

const SUPABASE_URL = "https://rfgvtuurrldknwueosus.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZ3Z0dXVycmxka253dWVvc3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTQ2MTEsImV4cCI6MjA4OTA5MDYxMX0.0wRATF3wKY2qERewWzESbNj7uChkdnHcJSJiZaXwnvk";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let textCount = 0;
let localTexts = [];

const saved = localStorage.getItem("texts");
if (saved) {
    localTexts = JSON.parse(saved);
    textCount = localTexts.length;
}

function renderTexts() {
    const container = document.getElementById("textList");
    container.innerHTML = "";

    localTexts.forEach((textObj, index) => {
        const div = document.createElement("div");
        div.className = "text-item";

        const label = document.createElement("span");
        label.textContent = textObj.name;
        label.style.cursor = "pointer";

        label.onclick = () => {
            document.getElementById("selectedText").textContent = textObj.content;
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteText(index);

        div.appendChild(label);
        div.appendChild(delBtn);
        container.appendChild(div);
    });
}

function setStatus(message) {
    document.getElementById("status").textContent = message;
}

async function getAccessToken() {
    const { data } = await supabase.auth.getSession();
    return data.session?.access_token || null;
}

async function requireLogin() {
    const token = await getAccessToken();

    if (!token) {
        setStatus("You are not logged in. Go back and log in first.");
        return null;
    }

    setStatus("Logged in.");
    return token;
}

window.addText = async function addText() {
    const token = await requireLogin();
    if (!token) return;

    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;

    setStatus("Saving text...");

    const res = await fetch(`${API_BASE}/add_texts`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ texts: [text] })
    });

    const data = await res.json();

    if (!res.ok || data.error || data.detail) {
        setStatus(data.error || data.detail || "Failed to save text.");
        return;
    }

    textCount++;
    const textName = "Text " + textCount;

    localTexts.push({ name: textName, content: text });
    localStorage.setItem("texts", JSON.stringify(localTexts));
    renderTexts();

    input.value = "";
    setStatus("Text saved.");
};

window.deleteText = function deleteText(index) {
    localTexts.splice(index, 1);
    localStorage.setItem("texts", JSON.stringify(localTexts));
    renderTexts();
    document.getElementById("selectedText").textContent = "";
    setStatus("Removed from local list only.");
};

window.resetProfile = async function resetProfile() {
    const token = await requireLogin();
    if (!token) return;

    setStatus("Deleting all profile data...");

    const res = await fetch(`${API_BASE}/reset_profile`, {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    });

    const data = await res.json();

    if (!res.ok || data.error || data.detail) {
        setStatus(data.error || data.detail || "Failed to reset profile.");
        return;
    }

    textCount = 0;
    localTexts = [];
    localStorage.removeItem("texts");
    renderTexts();
    document.getElementById("selectedText").textContent = "";

    setStatus("All profile data deleted.");
};

supabase.auth.onAuthStateChange(async () => {
    await requireLogin();
});

renderTexts();
await requireLogin();
</script>

</body>
</html>
