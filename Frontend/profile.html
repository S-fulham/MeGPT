<!DOCTYPE html>
<html>
<head>
    <title>Profile - MeGPT</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            color: #222;
        }

        h1, h2, h3 {
            margin-top: 0;
        }
        .navbar {
            width: 100%;
            background: #b3003b;
            color: white;
            display: flex;
            align-items: center;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .nav-left {
            font-size: 24px;
            font-weight: bold;
        }

        .subnav {
            width: 100%;
            background: #ddddd;
            padding: 12px 40px;
            box-sizing: border-box;
        }

        .nav-btn {
            text-decoration: none;
            color: #444;
            background: transparent;
            padding: 8px 16px;
            margin-right: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #dddddd;
        }

        .nav-btn.active {
            background: #b3003b;
            color: white;
        }

        .container {
            width: 700px;
            max-width: 90%;
            margin: 60px auto 40px auto;
        }

        .main-title {
            color: #b3003b;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .description {
            color: #555;
            margin-bottom: 25px;
            max-width: 600px;
        }

        .note {
            font-size: 0.95em;
            color: gray;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            resize: none;
            box-sizing: border-box;
            display: block;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background: #b3003b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px 0;
        }

        button:hover {
            background: #8a002e;
        }

        h3 {
            margin-top: 30px;
            margin-bottom: 12px;
        }

        .text-item {
            background: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .text-label {
            cursor: pointer;
            font-weight: bold;
            color: #333;
        }

        #selectedText {
            margin-top: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            min-height: 120px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">MeGPT</div>
</div>

<div class="subnav">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="profile.html" class="nav-btn active">Profile</a>
</div>

<div class="container">
    <p class="note">
        Recommended: Add at least 5 texts to build a strong profile.
    </p>

    <textarea id="textInput" placeholder="Type your text here..."></textarea>
    <button onclick="addText()">Add Text</button>

    <div id="savedTextsSection" style="display:none;">
        <h3>Your Texts</h3>
        <p class="note">
            Click on text to view.
        </p>
        <div id="textList"></div>
    </div>

    <div id="selectedTextSection" style="display:none;">
        <h3>Selected Text</h3>
        <pre id="selectedText"></pre>
    </div>
</div>

<script>
let textCount = 0;
let localTexts = [];

const saved = localStorage.getItem("texts");
if (saved) {
    localTexts = JSON.parse(saved);
    textCount = localTexts.length;
}

function renderTexts() {
    const container = document.getElementById("textList");
    const savedSection = document.getElementById("savedTextsSection");
    const selectedSection = document.getElementById("selectedTextSection");
    const selectedText = document.getElementById("selectedText");

    container.innerHTML = "";

    if (localTexts.length === 0) {
        savedSection.style.display = "none";
        selectedSection.style.display = "none";
        selectedText.textContent = "";
        return;
    } else {
        savedSection.style.display = "block";
    }

    localTexts.forEach((textObj, index) => {
        const div = document.createElement("div");
        div.className = "text-item";

        const label = document.createElement("span");
        label.textContent = textObj.name;
        label.className = "text-label";

        label.onclick = () => {
            selectedText.textContent = textObj.content;
            selectedSection.style.display = "block";
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteText(index);

        div.appendChild(label);
        div.appendChild(delBtn);
        container.appendChild(div);
    });
}

function addText() {
    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;

    const preview = text.split(" ").slice(0,5).join(" ") + "...";

    localTexts.push({ name: preview, content: text });
    localStorage.setItem("texts", JSON.stringify(localTexts));
    renderTexts();
    input.value = "";
}

document.addEventListener("click", function(e) {
    const selectedSection = document.getElementById("selectedTextSection");
    const selectedText = document.getElementById("selectedText");
    const textList = document.getElementById("textList");

    if (!selectedSection.contains(e.target) && !textList.contains(e.target)) {
        selectedSection.style.display = "none";
        selectedText.textContent = "";
    }
});

function deleteText(index) {
    localTexts.splice(index, 1);
    localStorage.setItem("texts", JSON.stringify(localTexts));
    renderTexts();
}

renderTexts();
</script>

</body>
</html>
