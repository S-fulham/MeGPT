<!DOCTYPE html>
<html>
<head>
    <title>Profile - MeGPT</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
        }

        button {
            padding: 6px 12px;
            margin: 5px 0;
            cursor: pointer;
        }

        .text-item {
            background: #f4f4f4;
            padding: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .note {
            font-size: 0.9em;
            color: gray;
        }
    </style>
</head>
<body>

<h1>Profile</h1>

<a href="index.html">
    <button>Back</button>
</a>

<p class="note">
Recommended: Add at least 5 texts to build a strong profile.
</p>

<textarea id="textInput" placeholder="Type your text here..."></textarea>
<button onclick="addText()">Add Text</button>

<h3>Saved Texts</h3>
<div id="textList"></div>

<button onclick="resetProfile()">Delete All</button>

<script>
const stored = localStorage.getItem("texts");
if (stored) localTexts = JSON.parse(stored);
textCount = localTexts.length;
renderTexts();
const API_BASE = "";
let textCount = 0;
let localTexts = [];

function renderTexts() {
    const container = document.getElementById("textList");
    container.innerHTML = "";

    localTexts.forEach((textObj, index) => {
        const div = document.createElement("div");
        div.className = "text-item";

        const label = document.createElement("span");
        label.textContent = textObj.name;

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteText(index);

        div.appendChild(label);
        div.appendChild(delBtn);
        container.appendChild(div);
    });
}

async function addText() {
    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;

    textCount++;
    const textName = "Text " + textCount;

    localTexts.push({ name: textName, content: text });
    renderTexts();

    // Save locally in browser
    localStorage.setItem("texts", JSON.stringify(localTexts));

fetch(`${API_BASE}/add_texts`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ texts: [text] })
});

    input.value = "";
}

function deleteText(index) {
    localTexts.splice(index, 1);
    renderTexts();
}

async function resetProfile() {
    textCount = 0;
    localTexts = [];
    renderTexts();

    localStorage.removeItem("texts");

fetch(`${API_BASE}/reset_profile`, {
    method: "POST"
});
}
</script>

</body>
</html>
