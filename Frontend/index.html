<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>MeGPT</title>
<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f5f7;
    color: #222;
}

h1, h2, h3 {
    margin-top: 0;
}
.navbar {
    width: 100%;
    background: #b3003b;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    box-sizing: border-box;
}

.nav-left {
    font-size: 24px;
    font-weight: bold;
}

.nav-right a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
}

.container {
    width: 700px;
    max-width: 90%;
    margin: 60px auto 0 auto;
}

textarea {
    width: 100%;
    height: 160px;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    resize: none;
    box-sizing: border-box;
    display: block;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    background: #b3003b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: block;
}

button:hover {
    background: #8a002e;
}

.output {
    margin-top: 25px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    min-height: 120px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    box-sizing: border-box;
}
.subnav {
    width: 100%;
    background: #ddddd;
    padding: 12px 40px;
    box-sizing: border-box;
}

.nav-btn {
    text-decoration: none;
    color: #444;
    background: transparent;
    padding: 8px 16px;
    margin-right: 10px;
    border-radius: 6px;
    font-weight: bold;
}

.nav-btn:hover {
    background: #dddddd;
}

.nav-btn.active {
    background: #b3003b;
    color: white;
}
.main-title {
    color: #b3003b;
    font-size: 36px;
    margin-bottom: 10px;
}
.description {
    color: #555;
    margin-bottom: 25px;
    max-width: 600px;
}
</style>
</head>
<body>
<div class="navbar">
    <div class="nav-left">MeGPT</div>
</div>

<div class="subnav">
    <a href="index.html" class="nav-btn active">Home</a>
    <a href="profile.html" class="nav-btn">Profile</a>
</div>

<div class="container">

    <h1 class="main-title">MeGPT - AI in your style</h1>

    <p class="description">
        This AI learns from your writing style and generates responses that sound like you.
    </p>

    <textarea placeholder="Enter your prompt here..."></textarea>

    <button>Generate</button>

    <div class="output" id="outputBox" style="display:none;"></div>

</div>
<script>
const API_BASE = "https://megpt-29p3.onrender.com";

function display(data) {
const box = document.getElementById("output");
box.textContent =
typeof data === "string"
? data
: JSON.stringify(data, null, 2);
box.style.display = "block";
}

async function generateText() {
const prompt = document.getElementById("promptInput").value.trim();
if (!prompt) return;

const savedTexts = JSON.parse(localStorage.getItem("texts") || "[]");
const textContents = savedTexts.map(item => item.content);

display("Generating...");

try {
    const res = await fetch(`${API_BASE}/generate`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            prompt: prompt,
            texts: textContents
        })
    });

    const data = await res.json();
    display(data.generated_text || data.error || data);
} catch (error) {
    display("Error: Could not connect to backend.");
}
}
</script>

</body>
</html>
